<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保衛站 - 專業維修服務官網</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        :root { 
            --primary-green: #1FC81F; 
            --primary-yellow: #f5c339; 
            --dark-gray: #333; 
            --dot-color: #ccc; 
            --bg-light: #f8f9fa;
        }
        
        body { font-family: "Microsoft JhengHei", -apple-system, sans-serif; margin: 0; background: #fff; overflow-x: hidden; color: var(--dark-gray); }

        /* --- 1. 導覽列 --- */
        header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; height: 60px; background: #fff; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .menu-btn { font-size: 24px; cursor: pointer; border: none; background: none; }

        /* --- 2. 輪播區塊 (修正重點：改用 Transform 防止空白) --- */
        .slider-wrapper { position: relative; width: 100%; overflow: hidden; background: #fff; }
        .slider-container {
            display: flex; 
            height: 350px; 
            cursor: grab; 
            user-select: none; 
            touch-action: pan-y;
            will-change: transform;
            /* 動畫時間拉長至 0.8s */
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .slider-container:active { cursor: grabbing; }
        
        .slide {
            flex: 0 0 100%; width: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white; font-weight: bold;
        }
        /* 圖片背景顏色保留 */
        .p1 { background: #85868A; } .p2 { background: #A0A1A5; }
        .p3 { background: #6C6D71; } .p4 { background: #4D4E52; }
        
        .dots-container {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 12px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dot-color); transition: 0.3s; cursor: pointer; }
        .dot.active { background: var(--primary-green); transform: scale(1.3); }

        /* --- 3. 內容與表格樣式 (完全保留) --- */
        .module-wrap { padding: 40px; background: #fff; border-radius: 15px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .feature-img { width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section-title { font-weight: 800; margin-bottom: 30px; position: relative; display: inline-block; }
        .section-title::after { content: ""; width: 60%; height: 5px; background: var(--primary-yellow); position: absolute; bottom: -10px; left: 0; }
        .table-container { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .table-nowrap td, .table-nowrap th { white-space: nowrap; padding: 15px 25px !important; }
        
        /* 側邊欄與按鈕邏輯保留 */
        .sidebar { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #fff; z-index: 1100; padding: 20px; transform: translateX(-110%); transition: 0.3s; }
        .sidebar.active { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1050; }
        .overlay.active { visibility: visible; opacity: 1; }
        .fixed-action-buttons { position: fixed; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .fab-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: none; }
        .fab-line { background-color: #06C755; } .fab-phone { background-color: #333; }
        .fab-top { background-color: #fff; color: #333; opacity: 0; visibility: hidden; transition: 0.3s; }
        .fab-top.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    <nav class="sidebar" id="sidebar">
        <h2 class="fw-bold mb-4">網站地圖</h2>
        <ul class="list-unstyled">
            <li class="py-3 border-bottom"><a href="#service1" class="text-decoration-none text-dark">iPhone 螢幕維修</a></li>
            <li class="py-3 border-bottom"><a href="#prices" class="text-decoration-none text-dark">維修價目表</a></li>
        </ul>
    </nav>

    <header>
        <div class="logo">GUARD STATION | 保衛站</div>
        <button class="menu-btn" id="openMenu">☰</button>
    </header>

    <div class="slider-wrapper">
        <div class="slider-container" id="slider">
            <div class="slide p4">年度維修優惠中 (4)</div>
            <div class="slide p1">iPhone 螢幕現場快修 (1)</div>
            <div class="slide p2">原廠等級電池更換 (2)</div>
            <div class="slide p3">全台連鎖 售後無憂 (3)</div>
            <div class="slide p4">年度維修優惠中 (4)</div>
            <div class="slide p1">iPhone 螢幕現場快修 (1)</div>
        </div>
        <div class="dots-container" id="dotsContainer">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <section id="service1" class="py-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 mb-4">
                    <img src="https://via.placeholder.com/600x400?text=Screen+Repair" class="feature-img">
                </div>
                <div class="col-md-6">
                    <div class="module-wrap">
                        <h2 class="section-title">iPhone 螢幕維修</h2>
                        <p>我們提供現場 30 分鐘快速更換螢幕服務。</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="prices" class="py-5 bg-light">
        <div class="container">
            <div class="table-container">
                <div class="table-responsive">
                    <table class="table table-hover table-nowrap mb-0">
                        <thead class="table-dark">
                            <tr><th>機型名稱</th><th>更換電池</th><th>更換螢幕</th></tr>
                        </thead>
                        <tbody>
                            <tr><td class="fw-bold">iPhone 15 Pro</td><td>$2,200</td><td>$11,500</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <div class="fixed-action-buttons">
        <a href="https://line.me" class="fab-btn fab-line" target="_blank">LINE</a>
        <a href="tel:031234567" class="fab-btn fab-phone">電話</a>
        <button class="fab-btn fab-top" id="backToTop">▲</button>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const dots = document.querySelectorAll('.dot');
        const slideCount = 4;
        let currentIndex = 1; 
        let isDragging = false;
        let startX, currentMoveX;
        let timer;
        let isAnimating = false;

        function setPosition(xOffset) {
            slider.style.transform = `translateX(${xOffset}px)`;
        }

        function updateSlider() {
            const width = slider.offsetWidth;
            isAnimating = true;
            // 設定平滑換圖時間
            slider.style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
            setPosition(-currentIndex * width);
            updateDots();
        }

        function updateDots() {
            let dotIdx = currentIndex - 1;
            if (currentIndex === 0) dotIdx = slideCount - 1;
            if (currentIndex === slideCount + 1) dotIdx = 0;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === dotIdx));
        }

        // 動畫結束後的無縫位置校準
        slider.addEventListener('transitionend', () => {
            isAnimating = false;
            if (currentIndex === 0) {
                slider.style.transition = 'none';
                currentIndex = slideCount;
                setPosition(-currentIndex * slider.offsetWidth);
            } else if (currentIndex === slideCount + 1) {
                slider.style.transition = 'none';
                currentIndex = 1;
                setPosition(-currentIndex * slider.offsetWidth);
            }
        });

        // 觸控開始
        slider.addEventListener('touchstart', (e) => {
            if (isAnimating) return;
            isDragging = true;
            startX = e.touches[0].pageX;
            slider.style.transition = 'none';
            clearInterval(timer);
        }, {passive: true});

        // 觸控中
        slider.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const currentX = e.touches[0].pageX;
            currentMoveX = currentX - startX;
            const width = slider.offsetWidth;
            setPosition(-currentIndex * width + currentMoveX);
        }, {passive: true});

        // 觸控結束
        slider.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            const width = slider.offsetWidth;
            // 滑動超過 15% 則換頁
            if (Math.abs(currentMoveX) > width * 0.15) {
                if (currentMoveX > 0) currentIndex--;
                else currentIndex++;
            }
            currentMoveX = 0;
            updateSlider();
            startTimer();
        });

        function startTimer() { 
            timer = setInterval(() => { 
                if (!isDragging) {
                    currentIndex++; 
                    updateSlider();
                }
            }, 5000); 
        }

        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => {
                if (isAnimating) return;
                clearInterval(timer);
                currentIndex = i + 1;
                updateSlider();
                startTimer();
            });
        });

        window.addEventListener('resize', () => {
            slider.style.transition = 'none';
            setPosition(-currentIndex * slider.offsetWidth);
        });

        // 初始化
        setPosition(-currentIndex * slider.offsetWidth);
        startTimer();

        // 原始選單與按鈕邏輯
        document.getElementById('openMenu').onclick = () => {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        };
        document.getElementById('overlay').onclick = () => {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        };
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) backToTopBtn.classList.add('show');
            else backToTopBtn.classList.remove('show');
        });
        backToTopBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    </script>
</body>
</html>
